services:
  postgres:
    image: postgres:16
    container_name: guardrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guardrail_lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - guardrail_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guardrail_lms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  guardrail_postgres_data:
